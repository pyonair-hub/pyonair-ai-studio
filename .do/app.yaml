name: pyonair-ai-studio
region: nyc
services:
  - name: web
    github:
      repo: pyonair-hub/pyonair-ai-studio
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 7860
    instance_count: 1
    instance_size_slug: apps-s-2vcpu-4gb
    envs:
      - key: LANGFLOW_DATABASE_URL
        value: ${db.DATABASE_URL}
        scope: RUN_TIME
      - key: LANGFLOW_AUTO_LOGIN
        value: "true"
        scope: RUN_TIME
databases:
  - name: db
    engine: PG
    production: false
